name: Tests

on:
  push:
    branches:
      - main
      - master
  pull_request:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

concurrency:
  group: quality-loop
  cancel-in-progress: true

jobs:
  quality-loop:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run quality loop
        run: python scripts/quality_loop.py

      - name: Upload quality report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-loop-report
          path: reports/quality_loop/latest.md

      - name: Write step summary
        if: always()
        run: |
          echo "### 30-minute quality loop" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -f reports/quality_loop/latest.md ]; then
            cat reports/quality_loop/latest.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Report was not generated." >> "$GITHUB_STEP_SUMMARY"
          fi
